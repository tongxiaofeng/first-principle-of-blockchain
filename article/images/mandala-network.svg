<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .title { font-family: "Heiti SC", "SimHei", "PingFang SC", sans-serif; font-size: 22px; fill: #1a202c; font-weight: bold; }
      .subtitle { font-family: "PingFang SC", "Heiti SC", sans-serif; font-size: 13px; fill: #718096; }
      .miner-label { font-family: "PingFang SC", "Heiti SC", sans-serif; font-size: 13px; fill: #ffffff; font-weight: bold; }
      .legend-text { font-family: "PingFang SC", "Heiti SC", sans-serif; font-size: 12px; fill: #4a5568; }
      .legend-sub { font-family: "PingFang SC", "Heiti SC", sans-serif; font-size: 11px; fill: #a0aec0; }
      .annotation { font-family: "PingFang SC", "Heiti SC", sans-serif; font-size: 11px; fill: #2d3748; }
    </style>
    <!-- Miner node gradient -->
    <radialGradient id="minerGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2b6cb0"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </radialGradient>
    <!-- Miner glow -->
    <filter id="minerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3182ce" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- SPV node gradient -->
    <radialGradient id="spvGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </radialGradient>
    <!-- Subtle background pattern -->
    <radialGradient id="bgGrad" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="6"/>
  <!-- Subtle border -->
  <rect width="800" height="600" fill="none" stroke="#e2e8f0" stroke-width="1" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" class="title">比特币网络的曼陀罗结构</text>
  <text x="400" y="57" text-anchor="middle" class="subtitle">Mandala Network: 核心高度互联，外围轻量连接</text>

  <!-- Center of diagram: cx=400, cy=310 -->
  <!-- 8 miner nodes on radius 110 -->
  <!-- Angle offset: -90 deg, step: 45 deg -->
  <!-- M0: (400, 200)  = 400+110*cos(-90), 310+110*sin(-90) -->
  <!-- M1: (477.8, 232.2) -->
  <!-- M2: (510, 310) -->
  <!-- M3: (477.8, 387.8) -->
  <!-- M4: (400, 420) -->
  <!-- M5: (322.2, 387.8) -->
  <!-- M6: (290, 310) -->
  <!-- M7: (322.2, 232.2) -->

  <!-- Miner-to-Miner connections (complete graph, 28 edges) -->
  <g stroke="#3182ce" stroke-width="1.2" opacity="0.18">
    <!-- M0 to all -->
    <line x1="400" y1="200" x2="477.8" y2="232.2"/>
    <line x1="400" y1="200" x2="510" y2="310"/>
    <line x1="400" y1="200" x2="477.8" y2="387.8"/>
    <line x1="400" y1="200" x2="400" y2="420"/>
    <line x1="400" y1="200" x2="322.2" y2="387.8"/>
    <line x1="400" y1="200" x2="290" y2="310"/>
    <line x1="400" y1="200" x2="322.2" y2="232.2"/>
    <!-- M1 to remaining -->
    <line x1="477.8" y1="232.2" x2="510" y2="310"/>
    <line x1="477.8" y1="232.2" x2="477.8" y2="387.8"/>
    <line x1="477.8" y1="232.2" x2="400" y2="420"/>
    <line x1="477.8" y1="232.2" x2="322.2" y2="387.8"/>
    <line x1="477.8" y1="232.2" x2="290" y2="310"/>
    <line x1="477.8" y1="232.2" x2="322.2" y2="232.2"/>
    <!-- M2 to remaining -->
    <line x1="510" y1="310" x2="477.8" y2="387.8"/>
    <line x1="510" y1="310" x2="400" y2="420"/>
    <line x1="510" y1="310" x2="322.2" y2="387.8"/>
    <line x1="510" y1="310" x2="290" y2="310"/>
    <line x1="510" y1="310" x2="322.2" y2="232.2"/>
    <!-- M3 to remaining -->
    <line x1="477.8" y1="387.8" x2="400" y2="420"/>
    <line x1="477.8" y1="387.8" x2="322.2" y2="387.8"/>
    <line x1="477.8" y1="387.8" x2="290" y2="310"/>
    <line x1="477.8" y1="387.8" x2="322.2" y2="232.2"/>
    <!-- M4 to remaining -->
    <line x1="400" y1="420" x2="322.2" y2="387.8"/>
    <line x1="400" y1="420" x2="290" y2="310"/>
    <line x1="400" y1="420" x2="322.2" y2="232.2"/>
    <!-- M5 to remaining -->
    <line x1="322.2" y1="387.8" x2="290" y2="310"/>
    <line x1="322.2" y1="387.8" x2="322.2" y2="232.2"/>
    <!-- M6 to remaining -->
    <line x1="290" y1="310" x2="322.2" y2="232.2"/>
  </g>

  <!-- Thicker core connections ring to emphasize dense mesh -->
  <g stroke="#3182ce" stroke-width="2" opacity="0.12">
    <!-- Adjacent miner connections (ring) -->
    <line x1="400" y1="200" x2="477.8" y2="232.2"/>
    <line x1="477.8" y1="232.2" x2="510" y2="310"/>
    <line x1="510" y1="310" x2="477.8" y2="387.8"/>
    <line x1="477.8" y1="387.8" x2="400" y2="420"/>
    <line x1="400" y1="420" x2="322.2" y2="387.8"/>
    <line x1="322.2" y1="387.8" x2="290" y2="310"/>
    <line x1="290" y1="310" x2="322.2" y2="232.2"/>
    <line x1="322.2" y1="232.2" x2="400" y2="200"/>
  </g>

  <!-- SPV-to-Miner connections -->
  <g stroke="#a0aec0" stroke-width="0.7" opacity="0.35">
    <!-- Top cluster (near M0 at 400,200) -->
    <line x1="400" y1="98" x2="400" y2="200"/>
    <line x1="438" y1="102" x2="400" y2="200"/>
    <line x1="362" y1="102" x2="400" y2="200"/>
    <!-- Top-right (near M1 at 477.8,232.2) -->
    <line x1="560" y1="118" x2="477.8" y2="232.2"/>
    <line x1="590" y1="148" x2="477.8" y2="232.2"/>
    <line x1="535" y1="108" x2="477.8" y2="232.2"/>
    <line x1="535" y1="108" x2="400" y2="200"/>
    <!-- Right (near M2 at 510,310) -->
    <line x1="645" y1="255" x2="510" y2="310"/>
    <line x1="655" y1="290" x2="510" y2="310"/>
    <line x1="640" y1="330" x2="510" y2="310"/>
    <line x1="655" y1="290" x2="477.8" y2="232.2"/>
    <!-- Bottom-right (near M3 at 477.8,387.8) -->
    <line x1="640" y1="395" x2="477.8" y2="387.8"/>
    <line x1="620" y1="435" x2="477.8" y2="387.8"/>
    <line x1="640" y1="395" x2="510" y2="310"/>
    <!-- Bottom (near M4 at 400,420) -->
    <line x1="560" y1="490" x2="477.8" y2="387.8"/>
    <line x1="510" y1="510" x2="400" y2="420"/>
    <line x1="450" y1="520" x2="400" y2="420"/>
    <line x1="400" y1="525" x2="400" y2="420"/>
    <line x1="350" y1="520" x2="400" y2="420"/>
    <line x1="290" y1="510" x2="400" y2="420"/>
    <!-- Bottom-left (near M5 at 322.2,387.8) -->
    <line x1="240" y1="490" x2="322.2" y2="387.8"/>
    <line x1="180" y1="435" x2="322.2" y2="387.8"/>
    <line x1="160" y1="395" x2="322.2" y2="387.8"/>
    <line x1="160" y1="395" x2="290" y2="310"/>
    <!-- Left (near M6 at 290,310) -->
    <line x1="155" y1="330" x2="290" y2="310"/>
    <line x1="145" y1="290" x2="290" y2="310"/>
    <line x1="155" y1="255" x2="290" y2="310"/>
    <line x1="145" y1="290" x2="322.2" y2="387.8"/>
    <!-- Top-left (near M7 at 322.2,232.2) -->
    <line x1="210" y1="148" x2="322.2" y2="232.2"/>
    <line x1="240" y1="118" x2="322.2" y2="232.2"/>
    <line x1="265" y1="108" x2="322.2" y2="232.2"/>
    <line x1="265" y1="108" x2="400" y2="200"/>
  </g>

  <!-- SPV user nodes (outer ring) -->
  <g>
    <!-- Top -->
    <circle cx="400" cy="98" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="438" cy="102" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="362" cy="102" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Top-right -->
    <circle cx="560" cy="118" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="590" cy="148" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="535" cy="108" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Right -->
    <circle cx="645" cy="255" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="655" cy="290" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="640" cy="330" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Bottom-right -->
    <circle cx="640" cy="395" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="620" cy="435" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Bottom -->
    <circle cx="560" cy="490" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="510" cy="510" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="450" cy="520" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="400" cy="525" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="350" cy="520" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="290" cy="510" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Bottom-left -->
    <circle cx="240" cy="490" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="180" cy="435" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="160" cy="395" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Left -->
    <circle cx="155" cy="330" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="145" cy="290" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="155" cy="255" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Top-left -->
    <circle cx="210" cy="148" r="8" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="240" cy="118" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="265" cy="108" r="7" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
  </g>

  <!-- Miner nodes -->
  <g filter="url(#minerGlow)">
    <!-- M0 -->
    <circle cx="400" cy="200" r="22" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1.5"/>
    <text x="400" y="205" text-anchor="middle" class="miner-label">M</text>
    <!-- M1 -->
    <circle cx="477.8" cy="232.2" r="22" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1.5"/>
    <text x="477.8" y="237.2" text-anchor="middle" class="miner-label">M</text>
    <!-- M2 -->
    <circle cx="510" cy="310" r="22" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1.5"/>
    <text x="510" y="315" text-anchor="middle" class="miner-label">M</text>
    <!-- M3 -->
    <circle cx="477.8" cy="387.8" r="22" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1.5"/>
    <text x="477.8" y="392.8" text-anchor="middle" class="miner-label">M</text>
    <!-- M4 -->
    <circle cx="400" cy="420" r="22" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1.5"/>
    <text x="400" y="425" text-anchor="middle" class="miner-label">M</text>
    <!-- M5 -->
    <circle cx="322.2" cy="387.8" r="22" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1.5"/>
    <text x="322.2" y="392.8" text-anchor="middle" class="miner-label">M</text>
    <!-- M6 -->
    <circle cx="290" cy="310" r="22" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1.5"/>
    <text x="290" y="315" text-anchor="middle" class="miner-label">M</text>
    <!-- M7 -->
    <circle cx="322.2" cy="232.2" r="22" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1.5"/>
    <text x="322.2" y="237.2" text-anchor="middle" class="miner-label">M</text>
  </g>

  <!-- Center label -->
  <text x="400" y="316" text-anchor="middle" class="annotation" opacity="0.5">近完全图</text>

  <!-- Legend box -->
  <g transform="translate(555, 528)">
    <rect x="0" y="-18" width="220" height="62" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="0.9"/>
    <!-- Miner legend -->
    <circle cx="18" cy="0" r="8" fill="url(#minerGrad)" stroke="#2c5282" stroke-width="1"/>
    <text x="34" y="4" class="legend-text">矿工节点（内环：高度互联）</text>
    <!-- SPV legend -->
    <circle cx="18" cy="26" r="6" fill="url(#spvGrad)" stroke="#cbd5e0" stroke-width="1"/>
    <text x="34" y="30" class="legend-text">SPV 用户（外围：轻量连接）</text>
  </g>
</svg>