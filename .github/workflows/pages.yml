name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build HTML
        run: |
          mkdir -p _site/images

          # Copy images and CSS
          cp article/images/*.png _site/images/
          cp article/web/style.css _site/style.css

          # Convert markdown to HTML with custom template
          pandoc \
            --standalone \
            --from markdown \
            --to html5 \
            --template article/web/template.html \
            --highlight-style tango \
            --wrap=none \
            -o _site/index.html \
            "article/区块链的第一性原理.md"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
