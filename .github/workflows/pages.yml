name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build HTML
        run: |
          mkdir -p _site/images

          # Copy images
          cp article/images/*.png _site/images/

          # Create pandoc CSS for professional Chinese typography
          cat > _site/style.css << 'CSSEOF'
          /* Reset & Base */
          *, *::before, *::after { box-sizing: border-box; }

          html {
            font-size: 18px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
          }

          body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                         "Noto Sans SC", "Source Han Sans SC", "WenQuanYi Micro Hei",
                         -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.85;
            color: #1a1a1a;
            background: #fdfdfd;
            margin: 0;
            padding: 0;
          }

          /* Article container */
          article, .content, body > :not(header):not(nav):not(footer) {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
          }

          /* Typography */
          h1 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin: 2.5rem 0 1.5rem;
            color: #111;
            border-bottom: 2px solid #e2e2e2;
            padding-bottom: 0.5rem;
          }

          h2 {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 2.2rem 0 1rem;
            color: #222;
          }

          h3 {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 1.8rem 0 0.8rem;
            color: #333;
          }

          h4, h5, h6 {
            font-size: 1.05rem;
            font-weight: 600;
            margin: 1.5rem 0 0.6rem;
            color: #444;
          }

          p {
            margin: 0 0 1.2rem;
            text-align: justify;
          }

          /* Links */
          a {
            color: #2563eb;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
          }
          a:hover {
            border-bottom-color: #2563eb;
          }

          /* Blockquotes */
          blockquote {
            margin: 1.5rem 0;
            padding: 0.8rem 1.2rem;
            border-left: 4px solid #3b82f6;
            background: #f0f6ff;
            color: #334155;
            border-radius: 0 4px 4px 0;
          }
          blockquote p {
            margin: 0.4rem 0;
          }
          blockquote p:last-child {
            margin-bottom: 0;
          }

          /* Lists */
          ul, ol {
            margin: 0 0 1.2rem;
            padding-left: 1.8rem;
          }
          li {
            margin: 0.3rem 0;
          }
          li > ul, li > ol {
            margin: 0.2rem 0;
          }

          /* Code */
          code {
            font-family: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code",
                         "Source Code Pro", Menlo, Consolas, "DejaVu Sans Mono", monospace;
            font-size: 0.88em;
            background: #f1f5f9;
            padding: 0.15em 0.4em;
            border-radius: 4px;
            color: #d63384;
          }

          pre {
            margin: 1.5rem 0;
            padding: 1.2rem 1.5rem;
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            overflow-x: auto;
            line-height: 1.6;
            font-size: 0.88rem;
          }
          pre code {
            background: none;
            padding: 0;
            color: inherit;
            font-size: inherit;
          }

          /* Images */
          img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1.8rem auto;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
          }

          /* Figure captions (pandoc wraps images with alt text in <figure>) */
          figure {
            margin: 1.8rem 0;
            text-align: center;
          }
          figcaption {
            font-size: 0.88rem;
            color: #64748b;
            margin-top: 0.6rem;
            line-height: 1.5;
            font-style: italic;
          }

          /* Tables */
          table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.95rem;
          }
          th, td {
            padding: 0.6rem 1rem;
            border: 1px solid #e2e8f0;
            text-align: left;
          }
          th {
            background: #f8fafc;
            font-weight: 600;
          }
          tr:hover {
            background: #f8fafc;
          }

          /* Horizontal rule */
          hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 2rem 0;
          }

          /* Emphasis & Strong */
          strong {
            font-weight: 600;
            color: #111;
          }
          em {
            font-style: italic;
          }

          /* Footnotes */
          .footnotes {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.9rem;
            color: #475569;
          }

          /* Print */
          @media print {
            body { font-size: 12pt; color: #000; background: #fff; }
            pre { background: #f5f5f5; color: #000; border: 1px solid #ccc; }
            a { color: #000; border-bottom: none; }
            img { box-shadow: none; }
          }

          /* Responsive */
          @media (max-width: 640px) {
            html { font-size: 16px; }
            article, .content, body > :not(header):not(nav):not(footer) {
              padding: 1rem 1rem 3rem;
            }
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.3rem; }
            pre { padding: 0.8rem 1rem; font-size: 0.82rem; }
          }
          CSSEOF

          # Convert markdown to HTML with pandoc
          pandoc \
            --standalone \
            --from markdown \
            --to html5 \
            --metadata title="区块链的第一性原理" \
            --metadata lang="zh-CN" \
            --css style.css \
            --highlight-style tango \
            --wrap=none \
            -o _site/index.html \
            "article/区块链的第一性原理.md"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
